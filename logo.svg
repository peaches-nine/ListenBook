<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#81C784"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="108" height="108" fill="url(#bgGradient)"/>

  <!-- Open book (center-bottom) -->
  <g transform="translate(26, 56)">
    <!-- Left page -->
    <path d="M26,0 L26,28 Q26,30 24,30 L2,30 Q0,30 0,28 L0,2 Q0,0 2,0 L24,0 Q26,0 26,2 Z" fill="white"/>
    <!-- Right page -->
    <path d="M28,0 L28,28 Q28,30 30,30 L52,30 Q54,30 54,28 L54,2 Q54,0 52,0 L30,0 Q28,0 28,2 Z" fill="white"/>
    <!-- Book spine -->
    <path d="M26,0 Q27,-2 28,0 L28,30 L26,30 Z" fill="white"/>
    <!-- Book lines -->
    <path d="M4,6 L22,6 M4,10 L22,10 M4,14 L22,14 M4,18 L22,18 M32,6 L50,6 M32,10 L50,10 M32,14 L50,14 M32,18 L50,18" stroke="#E0E0E0" stroke-width="0.8"/>
  </g>

  <!-- Headphone (center-top) -->
  <g transform="translate(36, 24)">
    <!-- Headband -->
    <path d="M4,14 Q4,4 18,4 Q32,4 32,14" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Left ear cup -->
    <path d="M2,14 Q0,14 0,16 L0,22 Q0,26 2,26 L6,26 Q8,26 8,22 L8,16 Q8,14 6,14 Z" fill="white"/>
    <!-- Right ear cup -->
    <path d="M30,14 Q28,14 28,16 L28,22 Q28,26 30,26 L34,26 Q36,26 36,22 L36,16 Q36,14 34,14 Z" fill="white"/>
    <!-- Sound waves -->
    <path d="M-4,18 Q-6,18 -6,20 Q-6,22 -4,22 M-8,16 Q-10,16 -10,20 Q-10,24 -8,24" fill="none" stroke="#81C784" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M40,18 Q42,18 42,20 Q42,22 40,22 M44,16 Q46,16 46,20 Q46,24 44,24" fill="none" stroke="#81C784" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>